apiVersion: apps/v1
kind: Deployment
metadata:
  name: arc-demo-app
  namespace: staging
  labels:
    app: arc-demo
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arc-demo
      environment: staging
  template:
    metadata:
      labels:
        app: arc-demo
        environment: staging
    spec:
      containers:
      - name: app
        image: nginx:alpine
        ports:
        - containerPort: 80
        env:
        - name: ENVIRONMENT
          value: "staging"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
